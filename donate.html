<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후원하기 | Lemonade For All Foundation</title>
    <style>
        :root {
            --primary-yellow: #FDFD96;
            --accent-yellow: #FFEE8C;
            --text-dark: #1A1A1A;
            --text-gray: #555555;
            --white: #FFFFFF;
            --bg-light: #FFFEF0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
            background-color: var(--white);
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        .logo span {
            width: 14px;
            height: 14px;
            background: var(--primary-yellow);
            border-radius: 50%;
            margin-right: 10px;
            border: 2.5px solid var(--text-dark);
        }

        .lang-toggle {
            cursor: pointer;
            background: var(--white);
            border: 2px solid var(--text-dark);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.85rem;
            text-decoration: none;
            color: var(--text-dark);
            transition: var(--transition);
        }

        .lang-toggle:hover {
            background: var(--primary-yellow);
        }

        .main-container {
            max-width: 600px;
            margin: 120px auto 80px;
            padding: 0 20px;
        }

        .donation-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .donation-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .donation-header p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        .donation-card {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary-yellow);
            display: inline-block;
            border-radius: 2px;
        }

        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .amount-option {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .amount-option:hover {
            border-color: var(--primary-yellow);
            background: var(--bg-light);
        }

        .amount-option.active {
            border-color: var(--text-dark);
            background: var(--primary-yellow);
        }

        .custom-amount-wrap {
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-gray);
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: var(--transition);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--text-dark);
        }

        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .payment-option:hover {
            background: var(--bg-light);
        }

        .payment-option.active {
            border-color: var(--text-dark);
            background: var(--white);
        }

        .payment-option input {
            margin-right: 15px;
            accent-color: var(--text-dark);
        }

        .payment-option span {
            font-weight: 700;
        }

        .bank-details {
            display: none;
            background: var(--bg-light);
            padding: 20px;
            border-radius: 12px;
            margin-top: -10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px dashed #d1d1d1;
        }

        .bank-details p {
            margin-bottom: 5px;
        }

        .bank-details strong {
            color: var(--text-dark);
        }

        .submit-btn {
            width: 100%;
            background: var(--text-dark);
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .amount-grid { grid-template-columns: 1fr; }
            .donation-card { padding: 25px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span></span>
                Lemonade For All
            </a>
            <a href="donate-en.html" class="lang-toggle">ENG</a>
        </div>
    </header>

    <div class="main-container">
        <div class="donation-header">
            <h1>세상을 바꾸는 작은 실천</h1>
            <p>보내주시는 따뜻한 마음은 지속 가능한 미래를 위해 소중히 사용됩니다.</p>
        </div>

        <div class="donation-card">
            <form id="donation-form">
                <div class="section-title">후원 금액 선택</div>
                <div class="amount-grid">
                    <div class="amount-option" data-value="10000">1만원</div>
                    <div class="amount-option" data-value="30000">3만원</div>
                    <div class="amount-option" data-value="50000">5만원</div>
                </div>
                <div class="custom-amount-wrap">
                    <input type="number" id="custom-amount" placeholder="직접 입력 (원)" min="1000">
                </div>

                <div class="section-title">후원자 정보</div>
                <div class="input-group">
                    <label>성명 (또는 닉네임)</label>
                    <input type="text" required placeholder="홍길동">
                </div>
                <div class="input-group">
                    <label>이메일 주소</label>
                    <input type="email" required placeholder="example@email.com">
                </div>

                <div class="section-title">결제 수단 선택</div>
                <div class="payment-methods">
                    <label class="payment-option active">
                        <input type="radio" name="payment" value="card" checked>
                        <span>신용 / 체크카드</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="bank">
                        <span>계좌 이체</span>
                    </label>
                </div>

                <div id="bank-info" class="bank-details">
                    <p><strong>은행:</strong> 평화글로벌은행</p>
                    <p><strong>계좌번호:</strong> 123-456-789012</p>
                    <p><strong>예금주:</strong> 레모네이드 포 올 재단</p>
                    <p style="margin-top:10px; font-size: 0.8rem; color: var(--text-gray);">
                        * 입금 시 후원자명을 기재해 주세요.
                    </p>
                </div>

                <div class="input-group">
                    <label>응원 메시지 (선택)</label>
                    <textarea placeholder="따뜻한 한마디를 남겨주세요..."></textarea>
                </div>

                <button type="submit" class="submit-btn">후원 완료하기</button>
            </form>
        </div>
    </div>

    <footer>
        <p>© 2026 Lemonade For All Foundation. All rights reserved.</p>
    </footer>

    <script>
        const amountOptions = document.querySelectorAll('.amount-option');
        const customInput = document.getElementById('custom-amount');

        amountOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                amountOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                customInput.value = '';
            });
        });

        customInput.addEventListener('input', () => {
            amountOptions.forEach(o => o.classList.remove('active'));
        });

        const paymentOptions = document.querySelectorAll('.payment-option');
        const bankInfo = document.getElementById('bank-info');

        paymentOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                paymentOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                
                const radio = opt.querySelector('input');
                if (radio.value === 'bank') {
                    bankInfo.style.display = 'block';
                } else {
                    bankInfo.style.display = 'none';
                }
            });
        });

        document.getElementById('donation-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('소중한 후원에 진심으로 감사드립니다!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
